<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store For Easy ~ Login</title>
    <link rel="icon" href="./logo of bage.jpeg">
    <link rel="stylesheet" href="./sign up.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <section class="container">
        <div class="left-side">
            <div class="logo-box">
                <div class="img">
                    <img src="./logo of bage.jpeg" alt="">
                </div>
                <h1>Store for Easy</h1>
                <p>YOUR GLOBAL MARKET</p>
            </div>
        </div>
        <div class="right-side">
            <div class="form-card">
                <form>
                    <label for=""></label>
                    <input type="text" id="Firstname" name="firstname" class="firstname" placeholder="Username">
                    <ul class="output"></ul>
                    <input type="email" name="email" id="email" class="email " placeholder="Email">
                    <ul class="output"></ul>
                    <input class="phone" type="tel" name="phone" id="phone" placeholder="Phone">
                    <ul class="output"></ul>
                    <div class="password-box">
                        <input type="password" name="password" class="password" placeholder="Password" id="password">
                        <ul class="output"></ul>
                        <span id="togglePassword">👁</span>
                    </div>

                    <button class="submit" type="submit">
                        <a href="./home.html">Login</a>
                    </button>
                </form>
            </div>
        </div>
    </section>
    <script src="./sign up.js"></script>
</body>

</html>
